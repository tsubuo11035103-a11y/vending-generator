<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>オリジナル自販機メーカー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>🥤 オリジナル自販機メーカー</h1>

    <section class="control-group">
      <label>1. 自販機カラーを選ぶ</label>
<div class="vending-color-picker">
  <label>
    <input type="radio" name="vending-color" value="red" checked>
    <span class="color-chip color-red"></span>
    赤
  </label>

  <label>
    <input type="radio" name="vending-color" value="white">
    <span class="color-chip color-white"></span>
    白
  </label>

  <label class="premium-locked">
    <input type="radio" name="vending-color" value="blue" disabled>
    <span class="color-chip color-blue"></span>
    青 🔒
  </label>
</div>
    </section>

    <section class="control-group">
      <label for="machine-name">2. 自販機名</label>
      <input id="machine-name" type="text" maxlength="18" placeholder="例：つぶおラボ" />
      <p class="hint">広告パネル部分に表示されます。空欄でもOK。</p>
    </section>

    <section class="control-group premium-section">
      <label>3. 広告パネル画像（任意） 🔒</label>
      <input id="screen-image" type="file" accept="image/*" disabled />
      <p class="hint">有料版では好きな画像＋自販機名を広告パネル部分に表示できます。</p>
    </section>

    <section class="control-group secret-box">
<div class="secret-preview">
  <img src="assets/drinks/black.png" alt="SECRET">
  <div>
    <div class="secret-title">👑 SECRET</div>
    <div class="secret-text">でたらラッキー✨</div>
  </div>
</div>
    </section>

    <section class="control-group note-unlock-section">
      <label for="note-password">🔑 note有料版の合言葉</label>
      <input id="note-password" type="password" placeholder="有料記事にある秘密の暗号を入力" />
      <button id="btn-unlock" class="btn btn-primary">🔓 有料版を解放する</button>
      <p id="license-message" class="license-message"></p>
      <p class="note-link-p">ドリンクラインナップ追加、透かしなし有料版を解放👉</p>
    </section>

    <section class="limit-counter-box">
      <div>今日の残り → 生成: <span id="count-generate">20</span>回 / 保存: <span id="count-download">3</span>回</div>
      <div id="premium-badge" style="display:none;">✨ 有料版ロック解除中 ✨</div>
    </section>

    <button id="btn-generate" class="btn btn-primary">🥤 自販機を生成する</button>
    <button id="btn-download" class="btn btn-download" disabled>📥 画像をダウンロード</button>
    <p class="download-note">
⚠️ 画像を保存できない場合は、<br>SafariやChromeで開いてお試しください
</p>
  <div id="secret-result" class="secret-result"></div>
<div class="preview-area">
  <p>【プレビュー】</p>
  <canvas id="result-canvas"></canvas>

</div>

    </main>

<footer class="footer">
  🥤 オリジナル自販機メーカー by tsubuo
</footer>

<script src="script.js"></script>
</body>
</html>
